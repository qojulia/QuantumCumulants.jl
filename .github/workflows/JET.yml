name: JET

on:
  push:
    branches:
      - 'master'
    paths:
      - '.github/workflows/JET.yml'
      - 'src/**'
      - 'test/quality/JET.jl'
      - 'Project.toml'
  pull_request:
    branches:
      - 'master'
    paths:
      - '.github/workflows/JET.yml'
      - 'src/**'
      - 'test/quality/JET.jl'
      - 'Project.toml'
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  jet:
    name: JET - Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: julia-actions/setup-julia@v2
        with:
          show-versioninfo: true
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - name: Set up test environment
        run: julia --project=test -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Run JET analysis
        run: julia --project=test test/quality/JET.jl
